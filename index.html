<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trivial Pursuit - Zona Bari Centro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Roboto', sans-serif !important; }
        body { background-color: #ECE9E6; color: #211638; touch-action: manipulation; }
        .wheel-container { position: relative; width: 260px; height: 260px; }
        .wheel-svg { overflow: hidden; border-radius: 50%; }
        .slice { cursor: pointer; transition: filter 0.2s ease; outline: none; stroke: #211638; stroke-width: 0.4; }
        .slice:hover { filter: brightness(1.15); }
        .slice:active { filter: brightness(0.9); }
        .dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.1); }
        @keyframes shake {
            0% { transform: translate(2px, 2px) rotate(0deg); }
            25% { transform: translate(-2px, -2px) rotate(-1deg); }
            50% { transform: translate(-2px, 2px) rotate(1deg); }
            75% { transform: translate(2px, -2px) rotate(0deg); }
            100% { transform: translate(2px, 2px) rotate(-1deg); }
        }
        .dice-roll { animation: shake 0.1s infinite; }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen">

    <div class="flex items-center justify-center gap-5 mb-8 w-full max-w-md">
        <img src="./baricentro.webp" alt="Bari Centro" class="w-20 h-auto drop-shadow-sm">
        <div class="flex flex-col">
            <h1 class="text-2xl font-black uppercase tracking-tighter text-[#462678] leading-tight">Trivial Pursuit</h1>
            <p class="text-[#E74030] font-bold text-sm uppercase tracking-widest leading-tight">Pattuglia Comunicazione</p>
            <p class="text-[#462678] font-black text-xs uppercase opacity-80">Zona Bari Centro</p>
        </div>
    </div>

    <div class="mb-6 w-full max-w-xs">
        <button onclick="window.rollDice()" id="dice-btn" class="w-full bg-white border-2 border-[#462678] text-[#462678] py-4 rounded-2xl font-black flex items-center justify-center gap-3 shadow-md active:scale-95 transition-all">
            <span id="dice-icon" class="text-2xl">🎲</span>
            <span id="dice-text" class="text-sm font-black">LANCIA IL DADO</span>
        </button>
    </div>

    <div class="wheel-container mb-8">
        <svg viewBox="0 0 100 100" class="wheel-svg w-full h-full drop-shadow-2xl">
            <defs>
                <clipPath id="circleView"><circle cx="50" cy="50" r="48.5" /></clipPath>
            </defs>
            <g clip-path="url(#circleView)">
                <path d="M50,50 L50,0 A50,50 0 0,1 93.3,25 Z" fill="#FDC500" class="slice" onclick="window.handleCategoryClick(1)" />
                <path d="M50,50 L93.3,25 A50,50 0 0,1 93.3,75 Z" fill="#8B4513" class="slice" onclick="window.handleCategoryClick(6)" />
                <path d="M50,50 L93.3,75 A50,50 0 0,1 50,100 Z" fill="#21A067" class="slice" onclick="window.handleCategoryClick(2)" />
                <path d="M50,50 L50,100 A50,50 0 0,1 6.7,75 Z" fill="#E74030" class="slice" onclick="window.handleCategoryClick(3)" />
                <path d="M50,50 L6.7,75 A50,50 0 0,1 6.7,25 Z" fill="#92B3D7" class="slice" onclick="window.handleCategoryClick(5)" />
                <path d="M50,50 L6.7,25 A50,50 0 0,1 50,0 Z" fill="#9B66A5" class="slice" onclick="window.handleCategoryClick(4)" />
            </g>
            <circle cx="50" cy="50" r="48.5" fill="none" stroke="#211638" stroke-width="2" />
        </svg>
    </div>

    <div class="grid grid-cols-3 gap-x-2 gap-y-6 mb-10 w-full max-w-sm px-1">
        <div class="flex flex-col items-center text-center">
            <div class="dot" style="background:#FDC500"></div>
            <span class="text-[12px] font-black text-[#462678] mt-2 leading-tight uppercase">Branca L/C</span>
        </div>
        <div class="flex flex-col items-center text-center">
            <div class="dot" style="background:#21A067"></div>
            <span class="text-[12px] font-black text-[#462678] mt-2 leading-tight uppercase">Branca E/G</span>
        </div>
        <div class="flex flex-col items-center text-center">
            <div class="dot" style="background:#E74030"></div>
            <span class="text-[12px] font-black text-[#462678] mt-2 leading-tight uppercase">Branca R/S</span>
        </div>
        <div class="flex flex-col items-center text-center">
            <div class="dot" style="background:#9B66A5"></div>
            <span class="text-[12px] font-black text-[#462678] mt-2 leading-tight uppercase">CoCa</span>
        </div>
        <div class="flex flex-col items-center text-center">
            <div class="dot" style="background:#92B3D7"></div>
            <span class="text-[12px] font-black text-[#462678] mt-2 leading-tight uppercase text-balance">Gruppo e varie</span>
        </div>
        <div class="flex flex-col items-center text-center">
            <div class="dot" style="background:#8B4513"></div>
            <span class="text-[12px] font-black text-[#462678] mt-2 leading-tight uppercase">Privacy</span>
        </div>
    </div>

    <div id="game-card" class="w-full max-w-sm bg-white rounded-3xl shadow-xl p-6 hidden mb-10 border-t-8 border-[#462678]">
        <div id="cat-tag" class="inline-block px-4 py-1.5 rounded-full text-white text-[11px] font-black mb-4 uppercase tracking-widest"></div>
        <p id="q-text" class="text-xl font-bold leading-tight mb-8 text-[#211638]"></p>
        <div class="space-y-4">
            <button onclick="document.getElementById('a-text').classList.toggle('hidden')" class="w-full bg-[#462678] text-white py-4 rounded-2xl font-black active:bg-[#211638] shadow-lg uppercase tracking-wide">Mostra Risposta</button>
            <p id="a-text" class="hidden text-center text-lg font-black text-[#21A067] p-5 bg-green-50 rounded-2xl border-2 border-green-200"></p>
            <button id="timer-btn" onclick="window.startTimer()" class="w-full border-2 border-[#E74030] text-[#E74030] py-3 rounded-2xl font-black uppercase text-xs tracking-widest">Avvia Timer (30s)</button>
        </div>
        <button onclick="window.clearHistory()" class="mt-10 text-[10px] text-gray-400 block mx-auto underline uppercase font-bold tracking-tighter">Resetta domande</button>
    </div>

<script>
    // Configurazione Categorie
    const categoryConfig = {
        1: { label: "Branca L/C", color: "#FDC500", key: "LC" }, // Nota: Aggiungi LC se presente nel foglio
        2: { label: "Branca E/G", color: "#21A067", key: "EG" },
        3: { label: "Branca R/S", color: "#E74030", key: "RS" },
        4: { label: "Comunità Capi", color: "#9B66A5", key: "Coca" },
        5: { label: "Gruppo e varie", color: "#92B3D7", key: "Generico" },
        6: { label: "Privacy", color: "#8B4513", key: "Privacy" }
    };

    let questions = []; // Verrà popolato dalla fetch
    const webAppUrl = "https://script.google.com/macros/s/AKfycby6mjVqRaDLqHgCzHBx_OS0xjLxEYuWQ2XjkINlFSw0VIj20dDDNNBsOGAp-A0QrrxM/exec";

    // Funzione per caricare i dati all'avvio
    async function initGame() {
        try {
            const response = await fetch(webAppUrl);
            const rawData = await response.json();
            
            // Pulizia del JSON di Google per renderlo compatibile con la logica del gioco
            questions = rawData.map((item, index) => {
                // Troviamo la chiave della domanda e della risposta (che sono dinamiche nel tuo foglio)
                const keys = Object.keys(item);
                return {
                    id: index,
                    q: item[keys[0]], // La prima colonna è la domanda
                    a: item[keys[1]], // La seconda colonna è la risposta
                    // Mappiamo la stringa "Generico", "RS", ecc al numero categoria 1-6
                    cat: Object.keys(categoryConfig).find(k => categoryConfig[k].key === item["Generico"]) || 5
                };
            }).filter(q => q.q && q.a); // Rimuove righe vuote

            console.log("Domande caricate:", questions.length);
            document.getElementById('dice-text').innerText = "Dati caricati! LANCIA IL DADO";
        } catch (e) {
            console.error("Errore caricamento:", e);
            alert("Errore nel caricamento delle domande dal foglio.");
        }
    }

    window.rollDice = function() {
        const btn = document.getElementById('dice-btn');
        const icon = document.getElementById('dice-icon');
        const text = document.getElementById('dice-text');
        
        btn.disabled = true;
        icon.classList.add('dice-roll');
        text.innerText = "...";
        
        setTimeout(() => {
            const result = Math.floor(Math.random() * 6) + 1;
            icon.classList.remove('dice-roll');
            text.innerHTML = `RISULTATO: <span class="text-2xl ml-2 font-black">${result}</span>`;
            btn.disabled = false;
        }, 400);
    };

    window.handleCategoryClick = function(cat) {
        if (questions.length === 0) {
            alert("Pazienta un attimo, sto ancora scaricando le domande...");
            return;
        }

        const catQuestions = questions.filter(q => parseInt(q.cat) === parseInt(cat));
        let seenIds = JSON.parse(localStorage.getItem('trivial_seen_ids') || '[]');
        const available = catQuestions.filter(q => !seenIds.includes(q.id));
        
        if (available.length === 0) {
            alert("Domande finite per questa categoria! Resetto la memoria...");
            window.clearHistory();
            return;
        }
        
        const selected = available[Math.floor(Math.random() * available.length)];
        seenIds.push(selected.id);
        localStorage.setItem('trivial_seen_ids', JSON.stringify(seenIds));
        showQuestion(selected, categoryConfig[cat]);
    };

    function showQuestion(q, config) {
        const card = document.getElementById('game-card');
        card.classList.remove('hidden');
        card.scrollIntoView({ behavior: 'smooth' });
        const tag = document.getElementById('cat-tag');
        tag.innerText = config.label;
        tag.style.backgroundColor = config.color;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('a-text').innerText = q.a;
        document.getElementById('a-text').classList.add('hidden');
        window.resetTimer();
    }

    window.clearHistory = function() {
        localStorage.removeItem('trivial_seen_ids');
        location.reload();
    };

    let interval;
    window.startTimer = function() {
        let time = 30;
        const btn = document.getElementById('timer-btn');
        btn.disabled = true;
        clearInterval(interval);
        interval = setInterval(() => {
            time--;
            btn.innerText = "Tempo: " + time + "s";
            if(time <= 0) {
                clearInterval(interval);
                btn.innerText = "TEMPO SCADUTO!";
                btn.classList.add('bg-[#E74030]', 'text-white');
            }
        }, 1000);
    };

    window.resetTimer = function() {
        clearInterval(interval);
        const btn = document.getElementById('timer-btn');
        btn.innerText = "Avvia Timer (30s)";
        btn.disabled = false;
        btn.className = "w-full border-2 border-[#E74030] text-[#E74030] py-3 rounded-2xl font-black uppercase text-xs tracking-widest";
    };

    // Avvia il caricamento dei dati
    initGame();
</script>
</body>
</html>
